    <script>
        // ============================================
        // ANALYTICS SYSTEM
        // ============================================
        class PortfolioAnalytics {
            constructor() {
                this.storageKey = 'portfolio_analytics_v2';
                this.sessionKey = 'portfolio_session_v2';
                this.currentDevice = this.detectDevice();
                this.init();
            }

            init() {
                this.trackVisit();
                this.startSessionTimer();
                this.updateDisplay();
                this.startRealTimeUpdates();
                this.highlightCurrentDevice();
            }

            getData() {
                const data = localStorage.getItem(this.storageKey);
                const defaultData = {
                    totalVisitors: 0, pageViews: 0, visits: [],
                    devices: { desktop: 0, mobile: 0, tablet: 0 },
                    pages: { home: 0, skills: 0, experience: 0, certifications: 0, contact: 0, analytics: 0 },
                    locations: {}, lastUpdated: new Date().toISOString()
                };
                if (!data) return defaultData;
                try {
                    const parsed = JSON.parse(data);
                    if (!parsed.devices) parsed.devices = defaultData.devices;
                    if (!parsed.pages.analytics) parsed.pages.analytics = 0;
                    return parsed;
                } catch (e) { return defaultData; }
            }

            saveData(data) {
                data.lastUpdated = new Date().toISOString();
                localStorage.setItem(this.storageKey, JSON.stringify(data));
            }

            detectDevice() {
                const userAgent = navigator.userAgent.toLowerCase();
                const width = window.innerWidth;
                if (/ipad|android(?!.*mobile)|tablet/.test(userAgent) || (width >= 768 && width < 1024)) return 'tablet';
                if (/mobile|iphone|ipod|android.*mobile|windows phone/.test(userAgent) || width < 768) return 'mobile';
                return 'desktop';
            }

            highlightCurrentDevice() {
                const deviceNames = {
                    desktop: currentLang === 'en' ? 'Desktop' : 'Ordinateur',
                    mobile: currentLang === 'en' ? 'Mobile' : 'Téléphone',
                    tablet: currentLang === 'en' ? 'Tablet' : 'Tablette'
                };
                const currentDeviceEl = document.getElementById('current-device');
                if (currentDeviceEl) currentDeviceEl.textContent = deviceNames[this.currentDevice];
                
                const iconId = 'icon-' + this.currentDevice;
                const icon = document.getElementById(iconId);
                if (icon) icon.classList.add('active');
            }

            async detectLocation() {
                const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const lang = navigator.language || navigator.userLanguage;
                const zoneMap = {
                    'America/Toronto': 'Canada', 'America/Montreal': 'Canada', 'America/Vancouver': 'Canada',
                    'Europe/Paris': 'France', 'Europe/Brussels': 'Belgique', 'Europe/Geneva': 'Suisse',
                    'Africa/Libreville': 'Gabon', 'Africa/Port-Gentil': 'Gabon',
                    'America/New_York': 'États-Unis', 'America/Los_Angeles': 'États-Unis', 'Europe/London': 'Royaume-Uni'
                };
                let location = zoneMap[timeZone] || 'Autre';
                if (location === 'Autre') {
                    if (lang.startsWith('fr')) location = 'France';
                    else if (lang.startsWith('en-US')) location = 'États-Unis';
                    else if (lang.startsWith('en-CA') || lang.startsWith('fr-CA')) location = 'Canada';
                    else if (lang.startsWith('en-GB')) location = 'Royaume-Uni';
                }
                return location;
            }

            getCurrentPage() {
                const hash = window.location.hash;
                if (hash.includes('competences')) return 'skills';
                if (hash.includes('experience')) return 'experience';
                if (hash.includes('certifications')) return 'certifications';
                if (hash.includes('contact')) return 'contact';
                if (hash.includes('analytics')) return 'analytics';
                return 'home';
            }

            trackVisit() {
                const data = this.getData();
                const session = sessionStorage.getItem(this.sessionKey);
                const now = new Date();
                
                if (!session) {
                    data.totalVisitors++;
                    sessionStorage.setItem(this.sessionKey, JSON.stringify({ startTime: now.toISOString(), pages: [] }));
                    data.devices[this.currentDevice]++;
                    this.detectLocation().then(location => {
                        data.locations[location] = (data.locations[location] || 0) + 1;
                        this.saveData(data);
                    });
                } else {
                    const sessionData = JSON.parse(session);
                    sessionData.pages.push({ page: this.getCurrentPage(), time: now.toISOString() });
                    sessionStorage.setItem(this.sessionKey, JSON.stringify(sessionData));
                }
                
                data.pageViews++;
                const currentPage = this.getCurrentPage();
                if (data.pages[currentPage] !== undefined) data.pages[currentPage]++;
                
                const visit = {
                    id: Date.now() + Math.random().toString(36).substr(2, 9),
                    timestamp: now.toISOString(), page: currentPage, device: this.currentDevice,
                    location: '...', referrer: document.referrer || 'direct'
                };
                
                this.detectLocation().then(location => {
                    visit.location = location;
                    data.visits.unshift(visit);
                    if (data.visits.length > 100) data.visits.pop();
                    this.saveData(data);
                    this.updateDisplay();
                });
                
                this.saveData(data);
                
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'page_view', {
                        page_title: document.title, page_location: window.location.href,
                        page_path: window.location.pathname + window.location.hash, device_category: this.currentDevice
                    });
                }
            }

            startSessionTimer() {
                this.sessionStart = Date.now();
                setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.sessionStart) / 1000);
                    const minutes = Math.floor(elapsed / 60);
                    const seconds = elapsed % 60;
                    const timeEl = document.getElementById('avg-time');
                    if (timeEl) timeEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }, 1000);
            }

            updateDisplay() {
                const data = this.getData();
                const t = analyticsTranslations[currentLang];
                
                const totalVisitorsEl = document.getElementById('total-visitors');
                const pageViewsEl = document.getElementById('page-views');
                
                if (totalVisitorsEl) totalVisitorsEl.textContent = data.totalVisitors.toLocaleString();
                if (pageViewsEl) pageViewsEl.textContent = data.pageViews.toLocaleString();
                
                const totalDevices = data.devices.desktop + data.devices.mobile + data.devices.tablet || 1;
                this.updateDeviceBar('desktop', Math.round((data.devices.desktop / totalDevices) * 100));
                this.updateDeviceBar('mobile', Math.round((data.devices.mobile / totalDevices) * 100));
                this.updateDeviceBar('tablet', Math.round((data.devices.tablet / totalDevices) * 100));
                
                this.updatePagesList(data.pages, t);
                this.updateLocationsList(data.locations, t);
                this.updateVisitorLog(data.visits, t);
            }

            updateDeviceBar(device, percentage) {
                const bar = document.getElementById(`device-${device}-bar`);
                const percent = document.getElementById(`device-${device}-percent`);
                if (bar) bar.style.width = percentage + '%';
                if (percent) percent.textContent = percentage + '%';
            }

            updatePagesList(pages, t) {
                const container = document.getElementById('pages-list');
                if (!container) return;
                const total = Object.values(pages).reduce((a, b) => a + b, 0) || 1;
                const pageNames = { home: t.home, skills: t.skills, experience: t.experience, certifications: t.certifications, contact: t.contact, analytics: 'Stats' };
                const sortedPages = Object.entries(pages).sort((a, b) => b[1] - a[1]).slice(0, 5);
                
                container.innerHTML = sortedPages.map(([page, count]) => {
                    const pct = Math.round((count / total) * 100);
                    return `
                        <div class="flex justify-between items-center">
                            <span class="text-gray-400 text-sm">${pageNames[page] || page}</span>
                            <div class="flex items-center gap-2">
                                <div class="w-24 h-2 bg-gray-700 rounded-full overflow-hidden">
                                    <div class="h-full bg-orange-400 rounded-full" style="width: ${pct}%"></div>
                                </div>
                                <span class="text-white font-medium text-sm w-10 text-right">${pct}%</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            updateLocationsList(locations, t) {
                const container = document.getElementById('locations-list');
                if (!container) return;
                const total = Object.values(locations).reduce((a, b) => a + b, 0) || 1;
                const sortedLocations = Object.entries(locations).sort((a, b) => b[1] - a[1]).slice(0, 5);
                
                if (sortedLocations.length === 0) {
                    container.innerHTML = '<div class="text-gray-500 text-sm text-center py-4">Aucune donnée</div>';
                    return;
                }
                
                const flags = { 'Canada': '🇨🇦', 'France': '🇫🇷', 'Belgique': '🇧🇪', 'Suisse': '🇨🇭', 'Gabon': '🇬🇦', 'États-Unis': '🇺🇸', 'Royaume-Uni': '🇬🇧', 'Autre': '🌍' };
                
                container.innerHTML = sortedLocations.map(([location, count]) => {
                    const pct = Math.round((count / total) * 100);
                    return `
                        <div class="flex justify-between items-center p-2 glass rounded-lg border border-white/10">
                            <div class="flex items-center gap-2">
                                <span class="text-lg">${flags[location] || '🌍'}</span>
                                <span class="text-gray-300 text-sm">${location}</span>
                            </div>
                            <span class="text-white font-medium text-sm">${pct}%</span>
                        </div>
                    `;
                }).join('');
            }

            updateVisitorLog(visits, t) {
                const container = document.getElementById('visitor-log');
                if (!container || !visits.length) return;
                
                const pageNames = { home: t.home, skills: t.skills, experience: t.experience, certifications: t.certifications, contact: t.contact, analytics: 'Stats' };
                
                container.innerHTML = visits.slice(0, 10).map(visit => {
                    const date = new Date(visit.timestamp);
                    const time = date.toLocaleTimeString(currentLang === 'en' ? 'en-US' : 'fr-FR', { hour: '2-digit', minute: '2-digit' });
                    const deviceIcon = { desktop: 'fa-desktop', mobile: 'fa-mobile-alt', tablet: 'fa-tablet-alt' }[visit.device] || 'fa-desktop';
                    const isCurrent = visit.id && visit.id.includes(Date.now().toString().slice(0, -4));
                    const highlightClass = isCurrent ? 'border-cyan-400 bg-cyan-400/10' : 'border-white/10 bg-white/5';
                    
                    return `
                        <div class="flex items-center justify-between p-3 ${highlightClass} rounded-lg border transition-all">
                            <div class="flex items-center gap-3">
                                <i class="fas ${deviceIcon} ${visit.device === 'desktop' ? 'text-cyan-400' : visit.device === 'mobile' ? 'text-purple-400' : 'text-green-400'}"></i>
                                <div>
                                    <span class="text-gray-300 text-sm capitalize">${pageNames[visit.page] || visit.page}</span>
                                    ${visit.location ? `<span class="text-xs text-gray-500 block">${visit.location}</span>` : ''}
                                </div>
                            </div>
                            <div class="text-gray-500 text-xs">${time}</div>
                        </div>
                    `;
                }).join('');
            }

            startRealTimeUpdates() {
                setInterval(() => {
                    const onlineNow = Math.floor(Math.random() * 3) + 1;
                    const el = document.getElementById('online-now');
                    if (el) el.textContent = onlineNow;
                }, 5000);
                setInterval(() => this.updateDisplay(), 30000);
            }
        }

        // ============================================
        // CHAT SYSTEM WITH QUALIFICATION
        // ============================================
        class QualificationSystem {
            constructor(chatSystem) {
                this.chat = chatSystem;
                this.teamsEmail = 'ahouansouange@live.fr';
                this.qualificationSteps = [
                    {
                        id: 'objective',
                        question: { fr: 'Quel est l\'objet de votre message ?', en: 'What is the purpose of your message?' },
                        options: [
                            { value: 'job', label: { fr: '💼 Opportunité d\'emploi', en: '💼 Job opportunity' }, icon: 'briefcase' },
                            { value: 'project', label: { fr: '🚀 Projet/Consultation', en: '🚀 Project/Consulting' }, icon: 'rocket' },
                            { value: 'question', label: { fr: '❓ Question technique', en: '❓ Technical question' }, icon: 'question-circle' },
                            { value: 'other', label: { fr: '📝 Autre', en: '📝 Other' }, icon: 'edit' }
                        ]
                    },
                    {
                        id: 'urgency',
                        question: { fr: 'Quelle est l\'urgence de votre demande ?', en: 'How urgent is your request?' },
                        options: [
                            { value: 'immediate', label: { fr: '🔴 Immédiate (cette semaine)', en: '🔴 Immediate (this week)' }, icon: 'exclamation-circle' },
                            { value: 'short', label: { fr: '🟠 Court terme (ce mois)', en: '🟠 Short term (this month)' }, icon: 'clock' },
                            { value: 'medium', label: { fr: '🟡 Moyen terme', en: '🟡 Medium term' }, icon: 'calendar' },
                            { value: 'future', label: { fr: '🟢 Futur projet', en: '🟢 Future project' }, icon: 'calendar-alt' }
                        ]
                    },
                    {
                        id: 'location',
                        question: { fr: 'Quelle est votre localisation ?', en: 'What is your location?' },
                        options: [
                            { value: 'montreal', label: { fr: '🏢 Montréal / Québec', en: '🏢 Montreal / Quebec' }, icon: 'building' },
                            { value: 'canada', label: { fr: '🍁 Autre région du Canada', en: '🍁 Other region of Canada' }, icon: 'maple-leaf' },
                            { value: 'remote', label: { fr: '🌐 International / Télétravail', en: '🌐 International / Remote' }, icon: 'globe' },
                            { value: 'other', label: { fr: '📍 Autre', en: '📍 Other' }, icon: 'map-marker-alt' }
                        ]
                    },
                    {
                        id: 'contact',
                        question: { fr: 'Comment préférez-vous être contacté ?', en: 'How would you prefer to be contacted?' },
                        options: [
                            { value: 'teams', label: { fr: '💬 Microsoft Teams (recommandé)', en: '💬 Microsoft Teams (recommended)' }, icon: 'microsoft' },
                            { value: 'email', label: { fr: '📧 Email', en: '📧 Email' }, icon: 'envelope' },
                            { value: 'linkedin', label: { fr: '💼 LinkedIn', en: '💼 LinkedIn' }, icon: 'linkedin' },
                            { value: 'phone', label: { fr: '📞 Téléphone', en: '📞 Phone' }, icon: 'phone' }
                        ]
                    }
                ];
                this.currentStep = 0;
                this.responses = {};
                this.isQualified = false;
            }

            start() {
                this.currentStep = 0;
                this.responses = {};
                this.isQualified = false;
                this.showProgressBar();
                this.askCurrentQuestion();
            }

            showProgressBar() {
                const progressContainer = document.getElementById('qualificationProgress');
                if (progressContainer) progressContainer.style.display = 'block';
                this.updateProgress();
            }

            updateProgress() {
                const progress = ((this.currentStep) / this.qualificationSteps.length) * 100;
                const progressBar = document.getElementById('progressBar');
                const progressText = document.getElementById('qualificationText');
                if (progressBar) progressBar.style.width = progress + '%';
                if (progressText) {
                    progressText.textContent = currentLang === 'fr' 
                        ? `Question ${this.currentStep + 1}/${this.qualificationSteps.length}` 
                        : `Question ${this.currentStep + 1}/${this.qualificationSteps.length}`;
                }
            }

            askCurrentQuestion() {
                if (this.currentStep >= this.qualificationSteps.length) {
                    this.completeQualification();
                    return;
                }
                const step = this.qualificationSteps[this.currentStep];
                const questionText = step.question[currentLang];
                this.chat.addBotMessage(questionText);
                
                const optionsHtml = `
                    <div class="chat-options">
                        ${step.options.map(opt => `
                            <button class="chat-option-btn" onclick="chat.qualification.handleResponse('${step.id}', '${opt.value}')">
                                <span>${opt.label[currentLang]}</span>
                            </button>
                        `).join('')}
                    </div>
                `;
                this.chat.addHTMLMessage(optionsHtml);
                this.updateProgress();
            }

            handleResponse(stepId, value) {
                this.responses[stepId] = value;
                const step = this.qualificationSteps.find(s => s.id === stepId);
                const option = step.options.find(o => o.value === value);
                this.chat.addUserMessage(option.label[currentLang]);
                this.currentStep++;
                setTimeout(() => this.askCurrentQuestion(), 500);
            }

            completeQualification() {
                this.isQualified = true;
                this.updateProgress();
                const summaryHtml = this.generateSummaryHTML();
                this.chat.addHTMLMessage(summaryHtml);
                
                setTimeout(() => {
                    this.chat.addBotMessage(chatTranslations[currentLang].qualificationComplete);
                    setTimeout(() => this.openTeamsWithContext(), 1500);
                }, 1000);
            }

            generateSummaryHTML() {
                const objectiveLabels = {
                    job: currentLang === 'fr' ? 'Opportunité d\'emploi' : 'Job opportunity',
                    project: currentLang === 'fr' ? 'Projet/Consultation' : 'Project/Consulting',
                    question: currentLang === 'fr' ? 'Question technique' : 'Technical question',
                    other: currentLang === 'fr' ? 'Autre' : 'Other'
                };
                const urgencyLabels = {
                    immediate: currentLang === 'fr' ? 'Immédiate' : 'Immediate',
                    short: currentLang === 'fr' ? 'Court terme' : 'Short term',
                    medium: currentLang === 'fr' ? 'Moyen terme' : 'Medium term',
                    future: currentLang === 'fr' ? 'Futur projet' : 'Future project'
                };
                const locationLabels = {
                    montreal: 'Montréal / Québec',
                    canada: currentLang === 'fr' ? 'Canada (autre)' : 'Canada (other)',
                    remote: currentLang === 'fr' ? 'International/Télétravail' : 'International/Remote',
                    other: currentLang === 'fr' ? 'Autre' : 'Other'
                };
                const contactLabels = {
                    teams: 'Microsoft Teams',
                    email: 'Email',
                    linkedin: 'LinkedIn',
                    phone: currentLang === 'fr' ? 'Téléphone' : 'Phone'
                };

                return `
                    <div class="context-summary">
                        <h4><i class="fas fa-clipboard-check"></i> ${currentLang === 'fr' ? 'Résumé de votre demande' : 'Summary of your request'}</h4>
                        <div class="context-item"><i class="fas fa-bullseye"></i> <strong>${currentLang === 'fr' ? 'Objet:' : 'Objective:'}</strong> ${objectiveLabels[this.responses.objective]}</div>
                        <div class="context-item"><i class="fas fa-clock"></i> <strong>${currentLang === 'fr' ? 'Urgence:' : 'Urgency:'}</strong> ${urgencyLabels[this.responses.urgency]}</div>
                        <div class="context-item"><i class="fas fa-map-marker-alt"></i> <strong>${currentLang === 'fr' ? 'Localisation:' : 'Location:'}</strong> ${locationLabels[this.responses.location]}</div>
                        <div class="context-item"><i class="fas fa-address-card"></i> <strong>${currentLang === 'fr' ? 'Contact préféré:' : 'Preferred contact:'}</strong> ${contactLabels[this.responses.contact]}</div>
                    </div>
                `;
            }

            openTeamsWithContext() {
                const contextMessage = this.buildContextMessage();
                this.showAutoOpenIndicator();
                const teamsUrl = `https://teams.microsoft.com/l/chat/0/0?users=${encodeURIComponent(this.teamsEmail)}&message=${encodeURIComponent(contextMessage)}`;
                window.open(teamsUrl, '_blank');
                
                setTimeout(() => this.hideAutoOpenIndicator(), 3000);
                
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'teams_auto_open', {
                        event_category: 'engagement', event_label: 'qualification_complete',
                        qualification_objective: this.responses.objective,
                        qualification_urgency: this.responses.urgency,
                        qualification_location: this.responses.location,
                        qualification_contact: this.responses.contact
                    });
                }
                this.connectAIAgent();
            }

            buildContextMessage() {
                const timestamp = new Date().toLocaleString(currentLang === 'fr' ? 'fr-FR' : 'en-US');
                let message = currentLang === 'fr' 
                    ? `🤖 NOUVEAU LEAD QUALIFIÉ - Portfolio\n\n`
                    : `🤖 NEW QUALIFIED LEAD - Portfolio\n\n`;
                message += currentLang === 'fr' ? `📅 Date: ${timestamp}\n` : `📅 Date: ${timestamp}\n`;
                message += `🎯 ${currentLang === 'fr' ? 'Objet' : 'Objective'}: ${this.responses.objective}\n`;
                message += `⏰ ${currentLang === 'fr' ? 'Urgence' : 'Urgency'}: ${this.responses.urgency}\n`;
                message += `📍 ${currentLang === 'fr' ? 'Localisation' : 'Location'}: ${this.responses.location}\n`;
                message += `💬 ${currentLang === 'fr' ? 'Contact préféré' : 'Preferred contact'}: ${this.responses.contact}\n\n`;
                message += currentLang === 'fr' 
                    ? `Bonjour Ange-Marie,\n\nJe suis intéressé(e) par votre profil. Voici les détails de ma demande :\n\n`
                    : `Hello Ange-Marie,\n\nI am interested in your profile. Here are the details of my request:\n\n`;
                message += currentLang === 'fr' 
                    ? `Merci de me recontacter sur ce canal ou par ${this.responses.contact}.\n\nCordialement,`
                    : `Please contact me back on this channel or via ${this.responses.contact}.\n\nBest regards,`;
                return message;
            }

            showAutoOpenIndicator() {
                const indicator = document.getElementById('autoTeamsIndicator');
                if (indicator) indicator.classList.add('active');
            }

            hideAutoOpenIndicator() {
                const indicator = document.getElementById('autoTeamsIndicator');
                if (indicator) indicator.classList.remove('active');
            }

            connectAIAgent() {
                setTimeout(() => {
                    const aiBadge = `
                        <div style="text-align: center; margin: 15px 0;">
                            <div class="ai-agent-badge">
                                <i class="fas fa-robot"></i>
                                <span>Agent IA Connecté</span>
                            </div>
                        </div>
                    `;
                    this.chat.addHTMLMessage(aiBadge);
                    
                    setTimeout(() => {
                        const aiMessage = currentLang === 'fr'
                            ? `Bonjour ! Je suis l'agent IA d'Ange-Marie. J'ai analysé votre demande et ouvert une conversation Microsoft Teams avec tout le contexte. Vous pouvez continuer la discussion directement sur Teams où Ange-Marie vous répondra personnellement.`
                            : `Hello! I am Ange-Marie's AI agent. I have analyzed your request and opened a Microsoft Teams conversation with all the context. You can continue the discussion directly on Teams where Ange-Marie will respond to you personally.`;
                        this.chat.addBotMessage(aiMessage);
                        
                        const reopenBtn = `
                            <div style="text-align: center; margin-top: 10px;">
                                <button class="teams-action-btn" onclick="chat.qualification.openTeamsWithContext()">
                                    <i class="fab fa-microsoft"></i>
                                    <span>${currentLang === 'fr' ? 'Ouvrir/réouvrir Teams' : 'Open/reopen Teams'}</span>
                                </button>
                            </div>
                        `;
                        this.chat.addHTMLMessage(reopenBtn);
                    }, 1000);
                }, 500);
            }
        }

        class ChatSystem {
            constructor() {
                this.isOpen = false;
                this.messages = [];
                this.teamsEmail = 'ahouansouange@live.fr';
                this.qualification = new QualificationSystem(this);
                this.qualificationMode = false;
                this.init();
            }

            init() {
                this.loadMessages();
                this.showWelcomeMessage();
                const hasVisited = localStorage.getItem('chat_visited');
                if (!hasVisited) {
                    setTimeout(() => {
                        this.open();
                        localStorage.setItem('chat_visited', 'true');
                    }, 10000);
                }
            }

            toggle() {
                if (this.isOpen) this.close();
                else this.open();
            }

            open() {
                this.isOpen = true;
                document.getElementById('chatContainer').classList.add('active');
                document.getElementById('chatButton').classList.add('active');
                const notif = document.getElementById('chatNotification');
                if (notif) notif.style.display = 'none';
                this.scrollToBottom();
            }

            close() {
                this.isOpen = false;
                document.getElementById('chatContainer').classList.remove('active');
                document.getElementById('chatButton').classList.remove('active');
            }

            showWelcomeMessage() {
                const t = chatTranslations[currentLang];
                const hour = new Date().getHours();
                let greeting = t.welcomeMessage;
                
                if (hour < 12) greeting = currentLang === 'fr' ? 'Bonjour ! ☀️ Comment puis-je vous aider ce matin ?' : 'Good morning! ☀️ How can I help you today?';
                else if (hour < 18) greeting = currentLang === 'fr' ? 'Bonjour ! 👋 Comment puis-je vous aider cet après-midi ?' : 'Good afternoon! 👋 How can I help you today?';
                else greeting = currentLang === 'fr' ? 'Bonsoir ! 🌙 Comment puis-je vous aider ce soir ?' : 'Good evening! 🌙 How can I help you tonight?';
                
                this.addBotMessage(greeting);
                setTimeout(() => this.showInitialOptions(), 1000);
            }

            showInitialOptions() {
                const options = [
                    { icon: '💼', text: currentLang === 'fr' ? 'Démarrer une qualification complète' : 'Start full qualification', action: 'start_qualification', highlight: true },
                    { icon: '❓', text: currentLang === 'fr' ? 'Poser une question rapide' : 'Ask a quick question', action: 'quick_question' },
                    { icon: '📄', text: currentLang === 'fr' ? 'Demander mon CV' : 'Request my resume', action: 'cv' }
                ];

                const html = `
                    <div class="chat-options">
                        ${options.map(opt => `
                            <button class="chat-option-btn ${opt.highlight ? 'border-cyan-400 bg-cyan-400/10' : ''}" onclick="chat.handleOption('${opt.action}')">
                                <span>${opt.icon}</span>
                                <span>${opt.text}</span>
                                ${opt.highlight ? '<i class="fas fa-star text-yellow-400 ml-auto"></i>' : ''}
                            </button>
                        `).join('')}
                    </div>
                    <div style="margin-top: 10px; padding: 8px; background: rgba(0,212,255,0.1); border-radius: 8px; font-size: 12px; color: var(--cyan); text-align: center; border: 1px solid rgba(0,212,255,0.3);">
                        <i class="fas fa-info-circle"></i> ${currentLang === 'fr' ? 'La qualification complète permet d\'ouvrir Teams automatiquement avec tout le contexte' : 'Full qualification automatically opens Teams with all context'}
                    </div>
                `;
                this.addHTMLMessage(html);
            }

            handleOption(action) {
                switch(action) {
                    case 'start_qualification':
                        this.qualificationMode = true;
                        this.addUserMessage(currentLang === 'fr' ? 'Je souhaite démarrer une qualification complète' : 'I want to start a full qualification');
                        setTimeout(() => this.qualification.start(), 500);
                        break;
                    case 'quick_question':
                        this.addUserMessage(currentLang === 'fr' ? 'J\'ai une question rapide' : 'I have a quick question');
                        setTimeout(() => {
                            this.addBotMessage(currentLang === 'fr' ? 
                                'Bien sûr ! ❓ Posez votre question et je vous répondrai. Si c\'est complexe, je vous redirigerai vers Teams.' : 
                                'Of course! ❓ Ask your question and I will answer. If it\'s complex, I will redirect you to Teams.');
                        }, 500);
                        break;
                    case 'cv':
                        this.addUserMessage(currentLang === 'fr' ? 'Je souhaite recevoir votre CV' : 'I would like to receive your resume');
                        setTimeout(() => {
                            this.addBotMessage(currentLang === 'fr' ? 
                                'Je vais vous envoyer mon CV par email ! 📄 Quelle est votre adresse email ?' : 
                                'I\'ll send you my resume by email! 📄 What is your email address?');
                        }, 500);
                        break;
                }
            }

            addBotMessage(text) {
                const message = { type: 'bot', text: text, time: new Date() };
                this.messages.push(message);
                this.renderMessage(message);
                this.saveMessages();
            }

            addUserMessage(text) {
                const message = { type: 'user', text: text, time: new Date() };
                this.messages.push(message);
                this.renderMessage(message);
                this.saveMessages();
                if (!this.qualificationMode && !this.qualification.isQualified) this.sendToTeams(text);
            }

            addHTMLMessage(html) {
                const container = document.getElementById('chatMessages');
                const div = document.createElement('div');
                div.className = 'message message-bot';
                div.innerHTML = `<div class="message-bubble">${html}</div>`;
                container.appendChild(div);
                this.scrollToBottom();
            }

            renderMessage(message) {
                const container = document.getElementById('chatMessages');
                const div = document.createElement('div');
                div.className = `message message-${message.type}`;
                const time = message.time.toLocaleTimeString(currentLang === 'en' ? 'en-US' : 'fr-FR', { hour: '2-digit', minute: '2-digit' });
                div.innerHTML = `
                    <div class="message-bubble">${this.escapeHtml(message.text)}</div>
                    <div class="message-time">${time}</div>
                `;
                container.appendChild(div);
                this.scrollToBottom();
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            scrollToBottom() {
                const container = document.getElementById('chatMessages');
                container.scrollTop = container.scrollHeight;
            }

            sendMessage() {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                if (!text) return;
                
                this.addUserMessage(text);
                input.value = '';
                
                if (this.qualificationMode) return;
                
                this.showTyping();
                setTimeout(() => {
                    this.hideTyping();
                    this.generateBotResponse(text);
                }, 1500);
            }

            showTyping() {
                const container = document.getElementById('chatMessages');
                const div = document.createElement('div');
                div.className = 'message message-bot typing-indicator-container';
                div.innerHTML = `
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                `;
                container.appendChild(div);
                this.scrollToBottom();
            }

            hideTyping() {
                const typing = document.querySelector('.typing-indicator-container');
                if (typing) typing.remove();
            }

            generateBotResponse(userText) {
                const lowerText = userText.toLowerCase();
                let response = '';
                
                if (lowerText.includes('salut') || lowerText.includes('bonjour') || lowerText.includes('hello') || lowerText.includes('hi')) {
                    response = currentLang === 'fr' ? 
                        'Bonjour ! 👋 Ravie de vous rencontrer. Souhaitez-vous démarrer une qualification complète pour que je puisse mieux vous aider ?' : 
                        'Hello! 👋 Nice to meet you. Would you like to start a full qualification so I can better help you?';
                } else if (lowerText.includes('merci') || lowerText.includes('thank')) {
                    response = currentLang === 'fr' ? 
                        'Avec plaisir ! 😊 N\'hésitez pas si vous avez d\'autres questions. Je peux aussi ouvrir Teams si vous préférez.' : 
                        'You\'re welcome! 😊 Feel free to ask if you have any other questions. I can also open Teams if you prefer.';
                } else if (lowerText.includes('email') || lowerText.includes('@') || lowerText.includes('contact')) {
                    response = currentLang === 'fr' ? 
                        'Vous pouvez m\'écrire directement sur Microsoft Teams ou m\'envoyer un email à ahouansouange@live.fr 📧' : 
                        'You can write to me directly on Microsoft Teams or send an email to ahouansouange@live.fr 📧';
                    this.addTeamsButton();
                } else if (lowerText.includes('disponible') || lowerText.includes('available') || lowerText.includes('quand')) {
                    response = currentLang === 'fr' ? 
                        'Je suis disponible immédiatement ! 🚀 Je peux commencer dès que vous le souhaitez. Souhaitez-vous que je vous qualifie pour ouvrir Teams ?' : 
                        'I am available immediately! 🚀 I can start whenever you want. Would you like me to qualify you to open Teams?';
                } else if (lowerText.includes('salaire') || lowerText.includes('salary') || lowerText.includes('rémunération')) {
                    response = currentLang === 'fr' ? 
                        'Je préfère discuter de la rémunération en entretien. Le plus important pour moi est de trouver un projet qui me passionne ! 💼' : 
                        'I prefer to discuss compensation in an interview. The most important thing for me is to find a project that I\'m passionate about! 💼';
                } else {
                    response = currentLang === 'fr' ? 
                        'Merci pour votre message ! 💬 Je vais ouvrir Teams automatiquement avec votre message. Souhaitez-vous plutôt faire une qualification complète pour un suivi optimal ?' : 
                        'Thank you for your message! 💬 I will automatically open Teams with your message. Would you rather do a full qualification for optimal follow-up?';
                    this.sendToTeams(userText);
                }
                this.addBotMessage(response);
            }

            addTeamsButton() {
                const t = chatTranslations[currentLang];
                const html = `
                    <button class="teams-action-btn" onclick="chat.qualification.openTeamsWithContext()">
                        <i class="fab fa-microsoft"></i>
                        <span>${t.continueOnTeams}</span>
                    </button>
                `;
                this.addHTMLMessage(html);
            }

            sendQuickMessage(text) {
                this.addUserMessage(text);
                this.showTyping();
                setTimeout(() => {
                    this.hideTyping();
                    this.generateBotResponse(text);
                }, 1000);
            }

            sendToTeams(message) {
                this.qualification.showAutoOpenIndicator();
                const teamsUrl = `https://teams.microsoft.com/l/chat/0/0?users=${encodeURIComponent(this.teamsEmail)}&message=${encodeURIComponent(message)}`;
                window.open(teamsUrl, '_blank');
                setTimeout(() => this.qualification.hideAutoOpenIndicator(), 3000);
                
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'teams_auto_open', {
                        event_category: 'engagement', event_label: 'quick_message', message_length: message.length
                    });
                }
            }

            saveMessages() {
                if (this.messages.length > 50) this.messages = this.messages.slice(-50);
                localStorage.setItem('chat_messages', JSON.stringify(this.messages));
            }

            loadMessages() {
                const saved = localStorage.getItem('chat_messages');
                if (saved) {
                    this.messages = JSON.parse(saved);
                    this.messages.slice(-10).forEach(msg => {
                        msg.time = new Date(msg.time);
                        this.renderMessage(msg);
                    });
                }
            }
        }

        // Initialize
        let chat;
        document.addEventListener('DOMContentLoaded', () => {
            initEmailJS();
            chat = new ChatSystem();
            window.portfolioAnalytics = new PortfolioAnalytics();
        });

        function toggleChat() { if (chat) chat.toggle(); }
        function sendChatMessage() { if (chat) chat.sendMessage(); }
        function sendQuickMessage(text) { if (chat) chat.sendQuickMessage(text); }
        function handleChatKeyPress(event) { if (event.key === 'Enter') sendChatMessage(); }

        // Hash change tracking
        window.addEventListener('hashchange', () => {
            if (window.portfolioAnalytics) window.portfolioAnalytics.trackVisit();
        });

        // Click tracking
        document.addEventListener('click', (e) => {
            if (e.target.closest('a')) {
                const link = e.target.closest('a');
                const href = link.getAttribute('href');
                if (typeof gtag !== 'undefined' && href && !href.startsWith('#')) {
                    gtag('event', 'click', { event_category: 'outbound', event_label: href, transport_type: 'beacon' });
                }
            }
        });
    </script>
    <script>
        // Timeline navigation
        function showExperience(companyId) {
            // Retirer la classe active de toutes les cartes
            document.querySelectorAll('.experience-card').forEach(card => {
                card.classList.remove('active');
            });

            // Ajouter la classe active à la carte ciblée
            const targetCard = document.getElementById('card-' + companyId);
            if (targetCard) {
                targetCard.classList.add('active');
                targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            // Mettre à jour les points de timeline
            document.querySelectorAll('.timeline-point').forEach(point => {
                point.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
        }

        // Activer la première carte par défaut au chargement
        document.addEventListener('DOMContentLoaded', () => {
            const firstCard = document.getElementById('card-ht241');
            if (firstCard) {
                firstCard.classList.add('active');
            }
        });
    </script>
</body>
</html>
